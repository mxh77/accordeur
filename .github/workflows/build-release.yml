name: Build Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Android Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Restore Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > accordeur.keystore

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Fix Kotlin version (RN 0.76.5 composite build locks 1.9.24, expo-modules-core needs 1.9.25)
        run: |
          # Pin kotlin-gradle-plugin explicitly in the generated build.gradle so the
          # composite-build version from @react-native/gradle-plugin is overridden.
          sed -i "s|classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')|classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.25')|" android/build.gradle
          # Also patch the version catalog used by subproject dependency resolution.
          sed -i 's/kotlin = "1.9.24"/kotlin = "1.9.25"/' node_modules/react-native/gradle/libs.versions.toml

      - name: Build release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ../accordeur.keystore
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$ANDROID_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$ANDROID_STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$ANDROID_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$ANDROID_KEY_PASSWORD

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: accordeur-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
