name: Build Debug APK

on:
  push:
    branches-ignore:
      - main

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Fix Kotlin version (RN 0.76.5 composite build locks 1.9.24, expo-modules-core needs 1.9.25)
        run: |
          # Pin kotlin-gradle-plugin explicitly in the generated build.gradle so the
          # composite-build version from @react-native/gradle-plugin is overridden.
          sed -i "s|classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')|classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.25')|" android/build.gradle
          # Also patch the version catalog used by subproject dependency resolution.
          sed -i 's/kotlin = "1.9.24"/kotlin = "1.9.25"/' node_modules/react-native/gradle/libs.versions.toml

      - name: Fix react-native-screens SafeAreaView type mismatch (Insets vs EdgeInsets)
        run: |
          # SafeAreaView.kt compares androidx.core.graphics.Insets with data class EdgeInsets
          # using !=, which Kotlin rejects because data class equals never returns true for
          # an unrelated type. Fix: convert to EdgeInsets first, then compare.
          python3 - <<'EOF'
          import pathlib
          f = pathlib.Path("node_modules/react-native-screens/android/src/main/java/com/swmansion/rnscreens/safearea/SafeAreaView.kt")
          src = f.read_text()
          src = src.replace(
              "        if (newSystemInsets != currentSystemInsets) {\n            currentSystemInsets = EdgeInsets.fromInsets(newSystemInsets)",
              "        val newEdgeInsets = EdgeInsets.fromInsets(newSystemInsets)\n        if (newEdgeInsets != currentSystemInsets) {\n            currentSystemInsets = newEdgeInsets"
          )
          f.write_text(src)
          print("Patched SafeAreaView.kt")
          EOF

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: accordeur-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
